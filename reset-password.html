<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Pickup Soccer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f2ee; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #2d5509; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.header img { width: 32px; height: 32px; border-radius: 8px; }
.header span { font-size: 17px; font-weight: 700; color: #fff; }
.wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 14px; padding: 28px 24px; width: 100%; max-width: 380px; border: 1px solid #e0e0e0; }
h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
p { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 14px; }
input:focus { border-color: #2d5509; box-shadow: 0 0 0 2px rgba(45,85,9,0.1); }
button { width: 100%; padding: 12px; background: #2d5509; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.alert { padding: 10px 13px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.green { background: #eaf5e0; color: #2a5c0e; border: 1px solid #a8d87a; }
.red { background: #fff5f5; color: #c0392b; border: 1px solid #f5c6c6; }
.back { display: inline-block; margin-top: 14px; color: #2d5509; font-size: 13px; text-decoration: none; text-align: center; width: 100%; }
</style>
</head>
<body>
<div class="header">
  <img src="https://raw.githubusercontent.com/aleks985-here/pickup-soccer/main/logo.png" alt="logo"/>
  <span>Pickup Soccer</span>
</div>
<div class="wrap">
  <div class="card">
    <h2>Set new password</h2>
    <p>Enter your new password below. Must be at least 6 characters.</p>
    <div id="form-area">
      <label>New password</label>
      <input type="password" id="pw" placeholder="At least 6 characters"/>
      <label>Confirm new password</label>
      <input type="password" id="pw2" placeholder="Repeat password"/>
      <div id="msg"></div>
      <button id="save-btn" onclick="savePassword()">Set new password</button>
    </div>
    <a class="back" href="/">← Back to app</a>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://fwjlwgadoixoegysoyrg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3amx3Z2Fkb2l4b2VneXNveXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTkzNjcsImV4cCI6MjA5MDAzNTM2N30.LBi4gbqU0LtW9MK_-0faEBdNmc2F0QQI7rT3nfuC7JA'
);

// Supabase auto-handles the recovery token from the URL hash
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('form-area').style.display = 'block';
  }
});

async function savePassword() {
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('save-btn');

  if (pw.length < 6) { msg.className='alert red'; msg.textContent='Password must be at least 6 characters.'; return; }
  if (pw !== pw2) { msg.className='alert red'; msg.textContent='Passwords do not match.'; return; }

  btn.disabled = true; btn.textContent = 'Saving…';
  const { error } = await sb.auth.updateUser({ password: pw });
  if (error) {
    msg.className = 'alert red'; msg.textContent = error.message;
    btn.disabled = false; btn.textContent = 'Set new password';
  } else {
    msg.className = 'alert green';
    msg.textContent = '✓ Password updated! Redirecting to app…';
    document.getElementById('form-area').querySelector('button').style.display = 'none';
    setTimeout(() => window.location.href = '/', 2000);
  }
}
</script>
</body>
</html>
