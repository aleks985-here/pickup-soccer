const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const { useState, useEffect, useMemo } = React;
const POSITIONS = ['GK','DEF','MID','FWD'];
const LABELS = ['A','B','C','D'];
const SKILL_LABELS = ['','First timer','Beginner','Learning','Casual','Recreational','Solid','Good','Very good','Competitive','Elite'];
const SKILL_DESC = ['',
  'Never played, no positional awareness',
  'Can kick the ball, very limited control',
  'Basic ball control, low game awareness',
  'Gets around the field, loses ball under pressure',
  'Completes simple passes, rarely scores',
  'Reliable passes in open play, creates chances',
  'Consistent under pressure, scores regularly',
  '80%+ pass accuracy, reads the game, finishes chances',
  'Dominant in pickup, competitive league standard',
  'Professional or ex-professional level'
];
const COLORS = ['#1565c0','#2e7d32','#b71c1c','#e65100','#6a1b9a','#00695c','#4e342e','#0277bd','#ad1457','#37474f'];

function col(n) { let h=0; for(let c of(n||'X'))h=(h+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function ini(n) { const p=(n||'X').trim().split(' '); return(p.length>1?p[0][0]+p[p.length-1][0]:n.slice(0,2)).toUpperCase(); }

function genTeams(players, n) {
  const s=[...players].sort((a,b)=>b.skill-a.skill);
  const gks=s.filter(p=>(p.positions||[]).includes('GK'));
  const rest=s.filter(p=>!gks.slice(0,n).includes(p));
  const ts=Array.from({length:n},()=>[]);
  gks.slice(0,n).forEach((g,i)=>ts[i].push(g));
  rest.forEach((p,i)=>{const pass=Math.floor(i/n),pos=i%n;ts[pass%2===0?pos:(n-1-pos)].push(p);});
  const avg=t=>t.length?t.reduce((s,p)=>s+p.skill,0)/t.length:0;
  for(let iter=0;iter<50;iter++){
    let best=0,si=-1,sj=-1,sti=-1,stj=-1;
    for(let ti=0;ti<n;ti++)for(let tj=ti+1;tj<n;tj++)for(let i=0;i<ts[ti].length;i++)for(let j=0;j<ts[tj].length;j++){
      const cur=Math.abs(avg(ts[ti])-avg(ts[tj]));
      const ni=[...ts[ti].slice(0,i),ts[tj][j],...ts[ti].slice(i+1)];
      const nj=[...ts[tj].slice(0,j),ts[ti][i],...ts[tj].slice(j+1)];
      const nd=Math.abs(avg(ni)-avg(nj));
      if(cur-nd>best){best=cur-nd;si=i;sj=j;sti=ti;stj=tj;}
    }
    if(si<0)break;
    const tmp=ts[sti][si];ts[sti][si]=ts[stj][sj];ts[stj][sj]=tmp;
  }
  return ts;
}

function Av({name,size=34,photo}) {
  if(photo) return <div className="av" style={{width:size,height:size,overflow:'hidden',borderRadius:'50%',flexShrink:0}}><img src={photo} alt={name} style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>;
  return <div className="av" style={{width:size,height:size,fontSize:size>28?12:10,background:col(name)+'22',color:col(name)}}>{ini(name)}</div>;
}

function LoginModal({onClose}) {
  const [mode,setMode]=useState('choose');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');
  const [busy,setBusy]=useState(false);

  const loginGoogle=async()=>{
    setBusy(true);setErr('');
    const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
    if(error){setErr(error.message);setBusy(false);}
  };

  const signIn=async()=>{
    setBusy(true);setErr('');
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error)setErr(error.message==='Invalid login credentials'?'Wrong email or password. Try again or create an account.':error.message);
    else onClose();
    setBusy(false);
  };

  const signUp=async()=>{
    if(pw.length<6){setErr('Password must be at least 6 characters.');return;}
    if(pw!==pw2){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');
    const {error}=await sb.auth.signUp({email,password:pw});
    if(error)setErr(error.message);
    else setMsg('Account created! Check your email to confirm, then sign in.');
    setBusy(false);
  };

  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h2>{mode==='signup'?'Create account':'Sign in'}</h2>

      {mode==='choose'&&<>
        <button className="btn full" style={{marginBottom:12,gap:10,justifyContent:'center',padding:'12px',fontSize:14,borderColor:'#dadce0'}} onClick={loginGoogle} disabled={busy}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <div style={{flex:1,height:1,background:'#e0e0e0'}}/>
          <span style={{fontSize:12,color:'#888'}}>or use email</span>
          <div style={{flex:1,height:1,background:'#e0e0e0'}}/>
        </div>
        <button className="btn full" style={{padding:'11px',fontSize:14,marginBottom:8}} onClick={()=>setMode('signin')}>Sign in with email</button>
        <button className="btn full" style={{padding:'11px',fontSize:14,background:'#f5f5f5',borderColor:'#e0e0e0'}} onClick={()=>setMode('signup')}>Create new account</button>
      </>}

      {(mode==='signin'||mode==='signup')&&<>
        <div className="field"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" autoFocus/></div>
        <div className="field"><label>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='signin'&&signIn()} placeholder={mode==='signup'?'At least 6 characters':''}/></div>
        {mode==='signup'&&<div className="field"><label>Confirm password</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&signUp()} placeholder="Repeat password"/></div>}
        {err&&<div className="alert red">{err}</div>}
        {msg&&<div className="alert green">{msg}</div>}
        {!msg&&<div className="mbtns">
          <button className="btn" onClick={()=>{setMode('choose');setErr('');setPw('');setPw2('');}}>← Back</button>
          {mode==='signin'
            ?<button className="btn primary full" onClick={signIn} disabled={busy||!email||!pw}>{busy?'Signing in…':'Sign in'}</button>
            :<button className="btn primary full" onClick={signUp} disabled={busy||!email||!pw||!pw2}>{busy?'Creating…':'Create account'}</button>
          }
        </div>}
        {!msg&&mode==='signin'&&<button style={{width:'100%',marginTop:10,background:'none',border:'none',color:'#888',fontSize:13,cursor:'pointer',padding:'6px'}} onClick={()=>{setMode('signup');setErr('');setPw('');}}>No account yet? Create one →</button>}
        {!msg&&mode==='signup'&&<button style={{width:'100%',marginTop:10,background:'none',border:'none',color:'#888',fontSize:13,cursor:'pointer',padding:'6px'}} onClick={()=>{setMode('signin');setErr('');setPw('');setPw2('');}}>Already have an account? Sign in →</button>}
      </>}

      <button className="btn full" style={{marginTop:12,color:'#aaa',border:'none',fontSize:13}} onClick={onClose}>Cancel</button>
    </div>
  </div>;
}

function PlayerForm({player,onSave,onCancel,busy}) {
  const [f,setF]=useState(player||{name:'',skill:5,positions:['MID']});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const tog=p=>set('positions',f.positions.includes(p)?f.positions.filter(x=>x!==p):[...f.positions,p]);
  return <div>
    <div className="field"><label>Name</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Player name" autoFocus/></div>
    <div className="field">
      <label>Skill rating — <b>{f.skill}/10</b> · <span style={{color:'#2d5509',fontWeight:600,fontSize:13}}>{SKILL_LABELS[f.skill]}</span></label>
      <div className="srow"><input type="range" min="1" max="10" step="1" value={f.skill} onChange={e=>set('skill',+e.target.value)}/><span className="snum">{f.skill}</span></div>
      <div style={{fontSize:12,color:'#777',marginTop:5,fontStyle:'italic'}}>{SKILL_DESC[f.skill]}</div>
    </div>
    <div className="field">
      <label style={{marginBottom:4}}>Positions</label>
      <div style={{fontSize:11,color:'#888',marginBottom:6}}>First selected = primary · second = secondary</div>
      <div className="pos-grid">{POSITIONS.map(p=>{
        const idx=f.positions.indexOf(p);
        return <div key={p} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <button className={`pos-chip${f.positions.includes(p)?' sel-'+p:''}`} onClick={()=>tog(p)}>{p}</button>
          {idx===0&&<span style={{fontSize:9,fontWeight:700,color:'#2d5509'}}>PRIMARY</span>}
          {idx===1&&<span style={{fontSize:9,color:'#888'}}>2nd</span>}
        </div>;
      })}</div>
    </div>
    <div className="mbtns">
      <button className="btn primary full" onClick={()=>f.name.trim()&&onSave(f)} disabled={!f.name.trim()||busy}>{busy?'Saving…':'Save'}</button>
      <button className="btn" onClick={onCancel}>Cancel</button>
    </div>
  </div>;
}

function BulkEdit({players,onUpdate,onClose}) {
  const [edits,setEdits]=useState(()=>Object.fromEntries(players.map(p=>[p.id,{skill:p.skill,positions:[...(p.positions||['MID'])]}])));
  const [q,setQ]=useState('');
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [dirty,setDirty]=useState({});
  const filtered=useMemo(()=>players.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())),[players,q]);

  const setSkill=(id,v)=>{setEdits(e=>({...e,[id]:{...e[id],skill:+v}}));setDirty(d=>({...d,[id]:true}));setSaved(false);};
  const togglePos=(id,pos)=>{
    setEdits(e=>{
      const cur=e[id].positions;
      const next=cur.includes(pos)?cur.filter(x=>x!==pos):[...cur,pos];
      return {...e,[id]:{...e[id],positions:next.length?next:['MID']}};
    });
    setDirty(d=>({...d,[id]:true}));setSaved(false);
  };

  const saveAll=async()=>{
    setSaving(true);
    const changed=players.filter(p=>dirty[p.id]);
    await Promise.all(changed.map(p=>onUpdate(p.id,{name:p.name,skill:edits[p.id].skill,positions:edits[p.id].positions})));
    setSaving(false);setSaved(true);setDirty({});
  };

  const dirtyCount=Object.keys(dirty).length;
  const POSCOLORS={GK:'#fff0eb',DEF:'#e8f2fc',MID:'#eaf5e0',FWD:'#fef6e4'};
  const POSTXT={GK:'#8b3a1e',DEF:'#1a4f80',MID:'#2a5c0e',FWD:'#7a4d00'};
  const POSBORDER={GK:'#e07b5a',DEF:'#5a9fd4',MID:'#6db33f',FWD:'#e8a820'};

  return <div className="section">
    <div className="hrow">
      <button className="btn sm" onClick={onClose}>← Back</button>
      <span className="page-title">Bulk edit</span>
      <span className="count">{players.length} players</span>
    </div>
    <div style={{marginBottom:8,fontSize:12,color:'#888'}}>Tap skill number to change · tap positions to toggle · save when done</div>
    {saved&&<div className="alert green" style={{marginBottom:10}}>All changes saved ✓</div>}
    <div style={{marginBottom:12}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍  Search…"/></div>
    <div style={{background:'#fff',border:'1px solid #e0e0e0',borderRadius:12,marginBottom:80}}>
      {filtered.map((p,i)=>{
        const e=edits[p.id];
        const isDirty=dirty[p.id];
        return <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderBottom:i<filtered.length-1?'1px solid #f0f0f0':'none',background:isDirty?'#fffdf0':'transparent'}}>
          <Av name={p.name} size={30} photo={p.photo_url}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:5}}>{p.name}{isDirty&&<span style={{fontSize:10,color:'#e8a820',fontWeight:700,marginLeft:6}}>EDITED</span>}</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {['GK','DEF','MID','FWD'].map(pos=><button key={pos} onClick={()=>togglePos(p.id,pos)} style={{padding:'2px 7px',borderRadius:4,fontSize:11,fontWeight:700,cursor:'pointer',border:`1px solid ${e.positions.includes(pos)?POSBORDER[pos]:'#ddd'}`,background:e.positions.includes(pos)?POSCOLORS[pos]:'#f9f9f9',color:e.positions.includes(pos)?POSTXT[pos]:'#aaa'}}>{pos}</button>)}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <button className="btn sm" style={{padding:'3px 8px',fontSize:13}} onClick={()=>setSkill(p.id,Math.max(1,e.skill-1))}>−</button>
            <span style={{fontFamily:'monospace',fontSize:16,fontWeight:700,color:'#2d5509',minWidth:18,textAlign:'center'}}>{e.skill}</span>
            <button className="btn sm" style={{padding:'3px 8px',fontSize:13}} onClick={()=>setSkill(p.id,Math.min(10,e.skill+1))}>+</button>
            <span style={{fontSize:10,color:'#888',maxWidth:64,lineHeight:1.2,textAlign:'left'}}>
              {SKILL_LABELS[e.skill]}
            </span>
          </div>
          </div>
        </div>;
      })}
    </div>
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e0e0e0',padding:'12px 16px',display:'flex',gap:10,maxWidth:600,margin:'0 auto',zIndex:20}}>
      {dirtyCount>0
        ?<button className="btn primary full" onClick={saveAll} disabled={saving}>{saving?'Saving…':`Save ${dirtyCount} change${dirtyCount>1?'s':''}`}</button>
        :<button className="btn full" onClick={onClose}>Done</button>
      }
    </div>
  </div>;
}

function Roster({players,isAdmin,canDelete,onAdd,onUpdate,onDelete}) {
  const [modal,setModal]=useState(null);
  const [bulk,setBulk]=useState(false);
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const list=useMemo(()=>players.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())),[players,q]);
  const save=async f=>{
    setBusy(true);
    if(modal==='add')await onAdd(f);
    else await onUpdate(modal.id,f);
    setBusy(false);setModal(null);
  };
  const del=async id=>{if(!window.confirm('Remove this player?'))return;await onDelete(id);};

  if(isAdmin&&bulk) return <BulkEdit players={players} onUpdate={onUpdate} onClose={()=>setBulk(false)}/>;

  return <div className="section">
    <div className="hrow">
      <span className="page-title">Roster</span>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span className="count">{players.length} players</span>
        {isAdmin&&<button className="btn sm" style={{color:'#2d5509',borderColor:'#a8d87a'}} onClick={()=>setBulk(true)}>✏️ Bulk edit</button>}
        {isAdmin&&<button className="btn primary sm" onClick={()=>setModal('add')}>+ Add</button>}
      </div>
    </div>
    <div style={{marginBottom:12}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍  Search players…"/></div>
    <div className="card-wrap">
      {list.length===0
        ?<div style={{padding:'16px 0',textAlign:'center',color:'#888',fontSize:13}}>No players found</div>
        :list.map(p=><div key={p.id} className="prow">
          <Av name={p.name} photo={p.photo_url}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
            <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
              {isAdmin&&<span className="spill">★ {p.skill}</span>}
              {(p.positions||['MID']).map(pos=><span key={pos} className={`ptag ${pos}`}>{pos}</span>)}
            </div>
          </div>
          {isAdmin&&<div style={{display:'flex',gap:6,flexShrink:0}}>
            <button className="btn sm" onClick={()=>setModal(p)}>Edit</button>
            {canDelete&&<button className="btn sm danger" onClick={()=>del(p.id)}>✕</button>}
          </div>}
        </div>)
      }
    </div>
    {modal&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="modal">
        <h2>{modal==='add'?'Add player':'Edit — '+modal.name}</h2>
        <PlayerForm player={modal!=='add'?modal:null} onSave={save} onCancel={()=>setModal(null)} busy={busy}/>
      </div>
    </div>}
  </div>;
}

function SubModal({player,teamIdx,teams,bench,onSub,onClose,isAdmin}) {
  const [tab,setTab]=useState('bench');
  const opts=tab==='bench'?bench:teams.flatMap((t,ti)=>ti===teamIdx?[]:t.map(p=>({...p,_ft:ti})));
  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h2>Substitute {player.name}</h2>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className={`btn sm${tab==='bench'?' primary':''}`} onClick={()=>setTab('bench')}>Bench ({bench.length})</button>
        <button className={`btn sm${tab==='swap'?' primary':''}`} onClick={()=>setTab('swap')}>Swap teams</button>
      </div>
      {opts.length===0
        ?<p style={{color:'#888',fontSize:14,padding:'8px 0'}}>No players available</p>
        :opts.map(sub=><div key={sub.id} className="prow" style={{cursor:'pointer'}} onClick={()=>onSub(player,teamIdx,sub,tab==='swap'?sub._ft:null)}>
          <Av name={sub.name} size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13}}>{sub.name}{tab==='swap'&&<span style={{fontSize:11,color:'#888'}}> from Team {LABELS[sub._ft]}</span>}</div>
            <div style={{display:'flex',gap:4,marginTop:2}}>
              {isAdmin&&<span className="spill">★{sub.skill}</span>}
              {(sub.positions||['MID']).slice(0,2).map(p=><span key={p} className={`ptag ${p}`}>{p}</span>)}
            </div>
          </div>
          <button className="btn sm primary">Sub in</button>
        </div>)
      }
      <div className="mbtns"><button className="btn full" onClick={onClose}>Cancel</button></div>
    </div>
  </div>;
}

function ScoreModal({game,onSave,onClose}) {
  const [sc,setSc]=useState({...(game.scores||{})});
  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h2>Score — {game.game_date}</h2>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap',marginBottom:16}}>
        {(game.teams||[]).map((t,ti)=><div key={ti} style={{textAlign:'center'}}>
          <div style={{fontSize:11,color:'#888',marginBottom:6,fontWeight:600}}>TEAM {LABELS[ti]}</div>
          <input type="number" min="0" value={sc[ti]??''} onChange={e=>setSc(s=>({...s,[ti]:e.target.value}))} style={{width:60,textAlign:'center',fontSize:22,fontWeight:700,padding:'6px 4px'}}/>
        </div>)}
      </div>
      <div className="mbtns">
        <button className="btn primary full" onClick={()=>onSave(sc)}>Save score</button>
        <button className="btn" onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>;
}

function TeamDisplay({teams,subs,isAdmin,bench,onSub,setSubModal,subModal,avg}) {
  return <>
    {subs&&subs.length>0&&<div className="alert amber"><b>Subs:</b> {subs.map((s,i)=><span key={i}>{i>0?', ':''}{s.out}→{s.in} (T{s.team})</span>)}</div>}
    {teams&&teams.map((team,ti)=><div key={ti} className={`tbox t${ti}`}>
      <div className="ttitle">
        <span>TEAM {LABELS[ti]}</span>
        {isAdmin&&avg&&<span style={{fontSize:12,fontWeight:400,opacity:0.65}}>avg ★{avg(team)}</span>}
      </div>
      {team.map((p,pi)=><div key={pi} className="tplayer">
        <Av name={typeof p==='string'?p:p.name} size={26} photo={typeof p==='string'?null:p.photo_url}/>
        <span style={{flex:1,fontWeight:500}}>{typeof p==='string'?p:p.name}</span>
        {typeof p!=='string'&&(p.positions||['MID']).slice(0,1).map(pos=><span key={pos} className={`ptag ${pos}`}>{pos}</span>)}
        {isAdmin&&typeof p!=='string'&&<span style={{fontSize:11,color:'#888',margin:'0 4px'}}>★{p.skill}</span>}
        {isAdmin&&setSubModal&&typeof p!=='string'&&<button className="btn sm warn" style={{padding:'3px 8px',fontSize:11}} onClick={()=>setSubModal({player:p,teamIdx:ti})}>SUB</button>}
      </div>)}
    </div>)}
  </>;
}

function ViewerGame({games}) {
  const latest=games&&games[0];
  if(!latest) return <div className="section">
    <div className="hrow"><span className="page-title">Next game</span></div>
    <div className="empty"><div className="icon">⚽</div><div className="title">No teams yet</div><p style={{fontSize:14}}>Check back closer to game day.</p></div>
  </div>;
  const getName=p=>typeof p==='string'?p:p.name;
  const getPos=p=>typeof p==='string'?[]:p.positions||[];
  const isGuest=p=>typeof p!=='string'&&p.isGuest;
  return <div className="section">
    <div className="hrow"><span className="page-title">Latest game</span><span className="count">{latest.player_count} players</span></div>
    <div style={{background:'#fff',border:'1px solid #e0e0e0',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13}}>
      <span style={{fontWeight:600,color:'#2d5509'}}>📅 {latest.game_date}</span>
      <span style={{color:'#888',marginLeft:8}}>{latest.team_count} teams · {latest.player_count} players</span>
    </div>
    {(latest.teams||[]).map((t,ti)=><div key={ti} className={`tbox t${ti}`}>
      <div className="ttitle">
        <span>TEAM {LABELS[ti]}</span>
        {latest.scores&&latest.scores[ti]!==undefined&&latest.scores[ti]!==0&&<span style={{fontSize:18,fontWeight:700}}>{latest.scores[ti]}</span>}
      </div>
      {t.map((p,i)=><div key={i} className="tplayer">
        <Av name={getName(p)} size={26} photo={p.photo_url}/>
        <span style={{flex:1,fontWeight:500}}>
          {getName(p)}
          {isGuest(p)&&<span style={{fontSize:10,background:'#fef6e4',color:'#7a4d00',border:'1px solid #f0c060',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:700}}>GUEST</span>}
        </span>
        <div style={{display:'flex',gap:3}}>{getPos(p).map(pos=><span key={pos} className={`ptag ${pos}`}>{pos}</span>)}</div>
      </div>)}
    </div>)}
    {latest.subs&&latest.subs.length>0&&<div style={{fontSize:12,color:'#888',marginTop:4}}>🔄 {latest.subs.map((s,i)=>`${s.out}→${s.in}`).join(', ')}</div>}
  </div>;
}

function Game({players,onSaveGame,isAdmin,games}) {
  const [step,setStep]=useState('attend');
  const [attending,setAttending]=useState([]); // array of player ids
  const [guests,setGuests]=useState({}); // {playerId: count} for +1/+2
  const [teams,setTeams]=useState(null);
  const [n,setN]=useState(2);
  const [scores,setScores]=useState({});
  const [saved,setSaved]=useState(false);
  const [subModal,setSubModal]=useState(null);
  const [subs,setSubs]=useState([]);
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [gameDate,setGameDate]=useState(()=>{
    // Default to next Sunday
    const d=new Date();
    const day=d.getDay();
    const daysUntilSunday=day===0?7:(7-day);
    d.setDate(d.getDate()+daysUntilSunday);
    return d.toISOString().slice(0,10);
  });
  const [gameTime,setGameTime]=useState('08:00');

  const tog=id=>setAttending(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);

  // Add/remove guest count for a player
  const addGuest=(id)=>setGuests(g=>({...g,[id]:Math.min((g[id]||0)+1,3)}));
  const removeGuest=(id)=>setGuests(g=>{const n={...g};if(n[id]>1)n[id]--;else delete n[id];return n;});

  // Build full attending list including guest objects
  const buildPresent=()=>{
    const base=players.filter(p=>attending.includes(p.id));
    const guestPlayers=[];
    base.forEach(p=>{
      const count=guests[p.id]||0;
      for(let i=1;i<=count;i++){
        guestPlayers.push({
          id:`guest_${p.id}_${i}`,
          name:`Guest${count>1?' '+i:''} (${p.name.split(' ')[0]})`,
          skill:5,positions:['MID'],isGuest:true,vouchedBy:p.name
        });
      }
    });
    return [...base,...guestPlayers];
  };

  const [presentPlayers,setPresentPlayers]=useState([]);
  const present=buildPresent();
  const totalCount=present.length;
  const filtered=useMemo(()=>players.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())),[players,q]);
  const inTeam=useMemo(()=>teams?new Set(teams.flat().map(p=>p.id)):new Set(),[teams]);
  const bench=presentPlayers.filter(p=>!inTeam.has(p.id));
  const avg=t=>t.length?(t.reduce((s,p)=>s+p.skill,0)/t.length).toFixed(1):'0';

  const gen=()=>{
    const p=buildPresent();
    setPresentPlayers(p);
    setTeams(genTeams(p,n));
    setScores({});setSaved(false);setSubs([]);setStep('teams');
  };
  const reshuffle=()=>{setTeams(genTeams(presentPlayers,n));setSaved(false);setSubs([]);};

  const doSub=(out,fromTi,inp,inTi)=>{
    setTeams(ts=>{
      const next=ts.map(t=>[...t]);
      if(inTi===null){const i=next[fromTi].findIndex(p=>p.id===out.id);next[fromTi][i]=inp;}
      else{const i=next[fromTi].findIndex(p=>p.id===out.id);const j=next[inTi].findIndex(p=>p.id===inp.id);next[fromTi][i]=inp;next[inTi][j]=out;}
      return next;
    });
    setSubs(s=>[...s,{out:out.name,in:inp.name,team:LABELS[fromTi]}]);
    setSubModal(null);setSaved(false);
  };

  const fmtDate=()=>{
    const d=new Date(gameDate+'T12:00:00');
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    return `${days[d.getDay()]} ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${gameTime}`;
  };

  const save=async()=>{
    setBusy(true);
    await onSaveGame({
      game_date:fmtDate(),
      team_count:n,
      player_count:totalCount,
      // Save objects with name+positions so viewer can show positions
      teams:teams.map(t=>t.map(p=>({name:p.name,positions:p.positions||['MID'],isGuest:p.isGuest||false}))),
      scores:Object.keys(scores).reduce((a,k)=>({...a,[k]:+scores[k]||0}),{}),
      subs
    });
    setSaved(true);setBusy(false);
  };

  if(!isAdmin) return <ViewerGame games={games}/>;

  if(step==='attend') return <div className="section">
    <div className="hrow">
      <span className="page-title">Who's playing?</span>
      {totalCount>0&&<span className="count">{totalCount} in</span>}
    </div>
    <div className="card-wrap" style={{padding:'12px 14px',marginBottom:14}}>
      <div style={{fontSize:12,color:'#666',marginBottom:8,fontWeight:500}}>📅 Game date &amp; time</div>
      <div style={{display:'flex',gap:8}}>
        <input type="date" value={gameDate} onChange={e=>setGameDate(e.target.value)} style={{flex:2}}/>
        <input type="time" value={gameTime} onChange={e=>setGameTime(e.target.value)} style={{flex:1}}/>
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <button className="btn sm" onClick={()=>setAttending(players.map(p=>p.id))}>All</button>
      <button className="btn sm" onClick={()=>{setAttending([]);setGuests({});}}>Clear</button>
      <div style={{flex:1}}/>
      <label style={{margin:0,fontSize:12}}>Teams:</label>
      <select value={n} onChange={e=>setN(+e.target.value)} style={{width:'auto',padding:'5px 8px',fontSize:13}}>
        <option value={2}>2</option><option value={3}>3</option><option value={4}>4</option>
      </select>
    </div>
    <div style={{marginBottom:12}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍  Search…"/></div>
    <div className="card-wrap" style={{marginBottom:14}}>
      {filtered.map(p=>{
        const isIn=attending.includes(p.id);
        const gCount=guests[p.id]||0;
        return <div key={p.id}>
          <div className="crow" onClick={()=>{tog(p.id);if(isIn)removeGuest(p.id)&&setGuests(g=>{const n={...g};delete n[p.id];return n;});}}>
            <div className={`chk${isIn?' on':''}`}>{isIn&&<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div>
            <Av name={p.name} size={28}/>
            <span style={{flex:1,fontWeight:500,fontSize:14}}>{p.name}</span>
            <span className="spill">★{p.skill}</span>
          </div>
          {isIn&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0 8px 38px',borderBottom:'1px solid #f0f0f0'}}>
            <span style={{fontSize:11,color:'#888'}}>+ guests:</span>
            <button className="btn sm" style={{padding:'2px 8px',fontSize:12,minWidth:24}} onClick={e=>{e.stopPropagation();if(gCount>0)removeGuest(p.id);}}>−</button>
            <span style={{fontSize:13,fontWeight:600,minWidth:16,textAlign:'center',color:gCount>0?'#2d5509':'#ccc'}}>{gCount}</span>
            <button className="btn sm" style={{padding:'2px 8px',fontSize:12,minWidth:24}} onClick={e=>{e.stopPropagation();addGuest(p.id);}}>+</button>
            {gCount>0&&<span style={{fontSize:11,color:'#2d5509',fontWeight:600}}>
              {gCount===1?`Guest (${p.name.split(' ')[0]})`:`${gCount} guests (${p.name.split(' ')[0]})`}
              <span style={{color:'#888',fontWeight:400}}> · skill 5 each</span>
            </span>}
          </div>}
        </div>;
      })}
    </div>
    {totalCount<2&&<div className="alert amber">Select at least 2 players</div>}
    <button className="btn primary full" onClick={gen} disabled={totalCount<2}>
      Generate teams ({totalCount} players{Object.values(guests).reduce((a,b)=>a+b,0)>0?`, incl. ${Object.values(guests).reduce((a,b)=>a+b,0)} guest${Object.values(guests).reduce((a,b)=>a+b,0)>1?'s':''}`:''})
    </button>
  </div>;

  return <div className="section">
    <div className="hrow">
      <button className="btn sm" onClick={()=>setStep('attend')}>← Back</button>
      <span className="page-title">Teams</span>
      <span className="count">{presentPlayers.length} playing</span>
    </div>
    <div style={{background:'#eaf5e0',border:'1px solid #a8d87a',borderRadius:8,padding:'8px 12px',marginBottom:12,fontSize:13,fontWeight:600,color:'#2d5509'}}>
      📅 {fmtDate()}
    </div>
    {subs.length>0&&<div className="alert amber"><b>Subs:</b> {subs.map((s,i)=><span key={i}>{i>0?', ':''}{s.out}→{s.in} (T{s.team})</span>)}</div>}
    {teams&&teams.map((team,ti)=><div key={ti} className={`tbox t${ti}`}>
      <div className="ttitle">
        <span>TEAM {LABELS[ti]}</span>
        {isAdmin&&<span style={{fontSize:12,fontWeight:400,opacity:0.65}}>avg ★{avg(team)}</span>}
      </div>
      {team.map(p=><div key={p.id} className="tplayer">
        <Av name={p.name} size={26}/>
        <span style={{flex:1,fontWeight:500}}>
          {p.name}{p.donor&&<span style={{fontSize:12,marginLeft:4}}>💚</span>}          {p.isGuest&&<span style={{fontSize:10,background:'#fef6e4',color:'#7a4d00',border:'1px solid #f0c060',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:700}}>GUEST</span>}
        </span>
        <div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {(p.positions||['MID']).map(pos=><span key={pos} className={`ptag ${pos}`}>{pos}</span>)}
        </div>
        {isAdmin&&<span style={{fontSize:11,color:'#888',margin:'0 4px',flexShrink:0}}>★{p.skill}</span>}
        <button className="btn sm warn" style={{padding:'3px 8px',fontSize:11,flexShrink:0}} onClick={()=>setSubModal({player:p,teamIdx:ti})}>SUB</button>
      </div>)}
    </div>)}
    {bench.length>0&&<div style={{fontSize:12,color:'#888',marginBottom:8}}>Bench: {bench.slice(0,5).map(p=>p.name).join(', ')}{bench.length>5?` +${bench.length-5} more`:''}</div>}
    <div className="card-wrap" style={{padding:'12px 14px',marginBottom:8}}>
      <div style={{fontSize:12,color:'#666',marginBottom:8,fontWeight:500}}>Score after game (optional)</div>
      <div style={{display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
        {teams&&teams.map((t,ti)=><div key={ti} style={{textAlign:'center'}}>
          <div style={{fontSize:11,color:'#888',marginBottom:4,fontWeight:600}}>TEAM {LABELS[ti]}</div>
          <input type="number" min="0" value={scores[ti]??''} onChange={e=>setScores(s=>({...s,[ti]:e.target.value}))} placeholder="0" style={{width:54,textAlign:'center',fontSize:20,fontWeight:700}}/>
        </div>)}
      </div>
    </div>
    <button className="reshuffle" onClick={()=>{reshuffle();setSaved(false);}}>↺ Reshuffle teams</button>
    {saved
      ?<div style={{marginTop:10}}>
        <div className="alert green" style={{textAlign:'center',marginBottom:8}}>Published ✓ — visible to everyone</div>
        <button className="btn full" style={{fontSize:13,color:'#2d5509',borderColor:'#a8d87a'}} onClick={()=>setSaved(false)}>Make changes</button>
      </div>
      :<button className="btn primary full" style={{marginTop:10}} onClick={save} disabled={busy}>{busy?'Saving…':'Save & publish teams'}</button>
    }
    {subModal&&<SubModal player={subModal.player} teamIdx={subModal.teamIdx} teams={teams} bench={bench} onSub={doSub} onClose={()=>setSubModal(null)} isAdmin={isAdmin}/>}
  </div>;
}

function AdjustGame({game,players,onSave,onClose}) {
  const getName=p=>typeof p==='string'?p:p.name;
  const getPos=p=>typeof p==='string'?[]:p.positions||[];

  const hydrate=t=>t.map(p=>{
    const name=getName(p);
    const found=players.find(pl=>pl.name===name);
    return found?{...found}:{id:'saved_'+name,name,positions:getPos(p),skill:5,isGuest:(typeof p!=='string'&&p.isGuest)||false};
  });

  const [teams,setTeams]=useState(()=>(game.teams||[]).map(hydrate));
  const [busy,setBusy]=useState(false);
  const [dragSrc,setDragSrc]=useState(null); // {player, fromTeam}
  const [dragOver,setDragOver]=useState(null); // {toTeam, toIdx}

  const avg=t=>t.length?(t.reduce((s,p)=>s+p.skill,0)/t.length).toFixed(1):'0';
  const n=teams.length;

  // Reshuffle using all currently assigned players
  const reshuffle=()=>{
    const all=teams.flat();
    const sorted=[...all].sort((a,b)=>b.skill-a.skill);
    const gks=sorted.filter(p=>(p.positions||[]).includes('GK'));
    const rest=sorted.filter(p=>!gks.slice(0,n).includes(p));
    const next=Array.from({length:n},()=>[]);
    gks.slice(0,n).forEach((g,i)=>next[i].push(g));
    rest.forEach((p,i)=>{const pass=Math.floor(i/n),pos=i%n;next[pass%2===0?pos:(n-1-pos)].push(p);});
    // Swap optimization
    const avgS=t=>t.length?t.reduce((s,p)=>s+p.skill,0)/t.length:0;
    for(let iter=0;iter<40;iter++){
      let best=0,si=-1,sj=-1,sti=-1,stj=-1;
      for(let ti=0;ti<n;ti++)for(let tj=ti+1;tj<n;tj++)for(let i=0;i<next[ti].length;i++)for(let j=0;j<next[tj].length;j++){
        const cur=Math.abs(avgS(next[ti])-avgS(next[tj]));
        const ni=[...next[ti].slice(0,i),next[tj][j],...next[ti].slice(i+1)];
        const nj=[...next[tj].slice(0,j),next[ti][i],...next[tj].slice(j+1)];
        const nd=Math.abs(avgS(ni)-avgS(nj));
        if(cur-nd>best){best=cur-nd;si=i;sj=j;sti=ti;stj=tj;}
      }
      if(si<0)break;
      const tmp=next[sti][si];next[sti][si]=next[stj][sj];next[stj][sj]=tmp;
    }
    setTeams(next);
  };

  // Move player to a specific team (appends to end)
  const moveToTeam=(player,fromTeam,toTeam)=>{
    setTeams(ts=>{
      const next=ts.map(t=>[...t]);
      next[fromTeam]=next[fromTeam].filter(p=>p.id!==player.id);
      next[toTeam]=[...next[toTeam],player];
      return next;
    });
  };

  // Drag handlers
  const onDragStart=(p,ti)=>{setDragSrc({player:p,fromTeam:ti});};
  const onDragEnd=()=>{setDragSrc(null);setDragOver(null);};
  const onDragOverPlayer=(e,ti,idx)=>{e.preventDefault();setDragOver({toTeam:ti,toIdx:idx});};
  const onDropOnPlayer=(e,ti,idx)=>{
    e.preventDefault();
    if(!dragSrc)return;
    const{player,fromTeam}=dragSrc;
    setTeams(ts=>{
      const next=ts.map(t=>[...t]);
      // Remove from source
      next[fromTeam]=next[fromTeam].filter(p=>p.id!==player.id);
      // Insert at target position (adjust for removal if same team)
      const insertIdx=fromTeam===ti&&idx>ts[fromTeam].findIndex(p=>p.id===player.id)?idx-1:idx;
      next[ti].splice(Math.min(insertIdx,next[ti].length),0,player);
      return next;
    });
    setDragSrc(null);setDragOver(null);
  };
  const onDropOnTeam=(e,ti)=>{
    e.preventDefault();
    if(!dragSrc||dragOver)return; // handled by onDropOnPlayer
    moveToTeam(dragSrc.player,dragSrc.fromTeam,ti);
    setDragSrc(null);setDragOver(null);
  };

  const removePlayer=(player,fromTeam)=>{
    setTeams(ts=>{const next=ts.map(t=>[...t]);next[fromTeam]=next[fromTeam].filter(p=>p.id!==player.id);return next;});
  };

  const saveChanges=async()=>{
    setBusy(true);
    await onSave(game.id,{
      teams:teams.map(t=>t.map(p=>({name:p.name,positions:p.positions||['MID'],isGuest:p.isGuest||false}))),
      player_count:teams.flat().length
    });
    setBusy(false);onClose();
  };

  const tColors=['#1a4f80','#7a4d00','#2a5c0e','#6a1040'];

  return <div className="section">
    <div className="hrow">
      <button className="btn sm" onClick={onClose}>← Back</button>
      <span className="page-title">Adjust teams</span>
    </div>

    <div style={{display:'flex',gap:8,marginBottom:12}}>
      <button className="btn full" style={{background:'#2d5509',color:'#fff',borderColor:'#2d5509',flex:1}} onClick={reshuffle}>↺ Auto-reshuffle</button>
    </div>

    <div style={{background:'#f0f8ff',border:'1px solid #b5d4f4',borderRadius:8,padding:'9px 13px',marginBottom:12,fontSize:12,color:'#1a4f80'}}>
      <b>Drag</b> players between teams, or tap <b>→ A/B</b> buttons to move. Tap <b>✕</b> to remove a no-show.
    </div>

    {teams.map((team,ti)=><div key={ti} className={`tbox t${ti}`}
      onDragOver={e=>{e.preventDefault();}}
      onDrop={e=>onDropOnTeam(e,ti)}
      style={{minHeight:80}}>
      <div className="ttitle">
        <span>TEAM {LABELS[ti]}</span>
        <span style={{fontSize:12,fontWeight:400,opacity:0.65}}>avg ★{avg(team)} · {team.length}P</span>
      </div>
      {team.map((p,pi)=>{
        const isDragging=dragSrc&&dragSrc.player.id===p.id;
        const isOver=dragOver&&dragOver.toTeam===ti&&dragOver.toIdx===pi;
        return <div key={p.id}
          draggable
          onDragStart={()=>onDragStart(p,ti)}
          onDragEnd={onDragEnd}
          onDragOver={e=>onDragOverPlayer(e,ti,pi)}
          onDrop={e=>onDropOnPlayer(e,ti,pi)}
          className="tplayer"
          style={{
            opacity:isDragging?0.4:1,
            cursor:'grab',
            borderTop:isOver?`2px solid ${tColors[ti]}`:'2px solid transparent',
            borderRadius:6,
            transition:'opacity 0.1s'
          }}>
          <span style={{color:'#bbb',fontSize:16,marginRight:4,cursor:'grab'}}>⠿</span>
          <Av name={p.name} size={24} photo={p.photo_url}/>
          <span style={{flex:1,fontWeight:500,fontSize:13}}>{p.name}</span>
          <div style={{display:'flex',gap:3,marginRight:4}}>
            {(p.positions||['MID']).map(pos=><span key={pos} className={`ptag ${pos}`}>{pos}</span>)}
          </div>
          <span style={{fontSize:11,color:'#888',marginRight:6}}>★{p.skill}</span>
          {teams.map((t,tIdx)=>tIdx!==ti&&<button key={tIdx} className="btn sm"
            style={{padding:'2px 6px',fontSize:10,color:tColors[tIdx],borderColor:tColors[tIdx]+'44',marginRight:2}}
            onClick={e=>{e.stopPropagation();moveToTeam(p,ti,tIdx);}}>
            →{LABELS[tIdx]}
          </button>)}
          <button className="btn sm danger" style={{padding:'2px 6px',fontSize:11}}
            onClick={e=>{e.stopPropagation();removePlayer(p,ti);}}>✕</button>
        </div>;
      })}
      {team.length===0&&<div style={{padding:'12px 0',textAlign:'center',fontSize:13,color:'#999',fontStyle:'italic'}}>Drop players here</div>}
    </div>)}

    <div className="mbtns" style={{marginTop:8}}>
      <button className="btn primary full" onClick={saveChanges} disabled={busy}>{busy?'Saving…':'Save & republish'}</button>
      <button className="btn" onClick={onClose}>Cancel</button>
    </div>
  </div>;
}

  };
  const del=async id=>{if(!window.confirm('Delete this game?'))return;await onDeleteGame(id);};

  const getName=p=>typeof p==='string'?p:p.name;

    </div>
    <div className="card-wrap">
      {games.map((g,gi)=><div key={g.id} className="gitem">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>

            <button className="btn sm" onClick={()=>setScoreModal(g)}>+ Score</button>
            {canDelete&&<button className="btn sm danger" onClick={()=>del(g.id)}>✕</button>}
          </div>}
        </div>
        {(g.teams||[]).map((t,ti)=><div key={ti} style={{fontSize:12,marginBottom:3,display:'flex',gap:7,alignItems:'flex-start'}}>
          <b style={{minWidth:14,color:['#1a4f80','#7a4d00','#2a5c0e','#6a1040'][ti]||'#333',flexShrink:0}}>{'ABCD'[ti]}</b>
          {g.scores&&g.scores[ti]!==undefined&&g.scores[ti]!==0&&<b style={{color:['#1a4f80','#7a4d00','#2a5c0e','#6a1040'][ti]||'#333',minWidth:14,flexShrink:0}}>{g.scores[ti]}</b>}
          <span style={{color:'#555'}}>{t.map(getName).join(', ')}</span>
        </div>)}
        {g.subs&&g.subs.length>0&&<div style={{marginTop:5,fontSize:11,color:'#888'}}>🔄 {g.subs.map((s,i)=>`${s.out}→${s.in}`).join(', ')}</div>}

  </div>;
}

      sb.from('user_roles').select('*').order('created_at'),
      sb.from('group_settings').select('*').eq('id',1).single()

  const captainEmails=new Set(captains.map(c=>c.player_id));

    if(!emailInput.trim()){setMsg('Enter their email first.');return;}
    setBusy(true);setMsg('');
    const {error}=await sb.from('user_roles').insert({
      email:emailInput.trim().toLowerCase(),

      <div className="card-wrap" style={{padding:'14px',marginBottom:16}}>

        <div style={{display:'flex',gap:8,marginTop:4}}>
          <input value={settings?.kofi_url||''} onChange={e=>setSettings(s=>({...s,kofi_url:e.target.value}))} placeholder="https://ko-fi.com/yourname"/>
          <button className="btn primary" style={{flexShrink:0}} onClick={saveSettings} disabled={busy}>Save</button>

          <button className="btn sm" style={{background:p.donor?'#f0faf0':'none',borderColor:p.donor?'#a8d87a':'#ccc',color:p.donor?'#2d5509':'#888'}}
            onClick={async()=>{await sb.from('players').update({donor:!p.donor}).eq('id',p.id);window.location.reload();}}>
            {p.donor?'💚 Donor':'Mark donor'}

    {msg&&<div className={`alert ${msg.startsWith('Error')?'red':'green'}`} style={{marginTop:12}}>{msg}</div>}
  </div>;
}

    sb.auth.getSession().then(({data})=>{
      setUser(data.session?.user??null);
      if(data.session?.user)fetchRole(data.session.user.email);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user??null);
      if(session?.user)fetchRole(session.user.email);
      else{setRole(null);setPendingCount(0);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function fetchRole(email) {
    const {data,error}=await sb.from('user_roles').select('role').eq('email',email).maybeSingle();
    if(error)console.error('fetchRole error:',error.message);
    const r=data?.role||null;
    setRole(r);
    if(r==='admin'||r==='captain') fetchPendingCount();
    else checkPlayerProfile();
  }

  async function checkPlayerProfile() {
    // Only redirect non-admin/captain users who have no profile
    const {data:{user:u}}=await sb.auth.getUser();
    if(!u) return;
    // Check if linked to a player already
    const {data:linked}=await sb.from('players').select('id').eq('auth_user_id',u.id).maybeSingle();
    if(linked) return; // Already on roster — stay on index
    // Check if pending profile exists
    const {data:pending}=await sb.from('pending_profiles').select('id').eq('auth_user_id',u.id).maybeSingle();
    if(!pending) {
      // No profile at all — redirect to profile page
      window.location.href='/profile';
    }
  }

  async function fetchPendingCount() {
    const {count}=await sb.from('pending_profiles').select('*',{count:'exact',head:true}).eq('status','pending');
    setPendingCount(count||0);
  }

  useEffect(()=>{load();},[]);

  async function load() {
    const [{data:p},{data:g},{data:s}]=await Promise.all([
      sb.from('players').select('*').order('name'),
      sb.from('games').select('*').order('created_at',{ascending:false}),
      sb.from('group_settings').select('*').eq('id',1).single()
    ]);
    setPlayers(p||[]);
    setGames(g||[]);
    if(s?.group_name)setGroupName(s.group_name);
    setLoading(false);
  }

  const addPlayer=async f=>{await sb.from('players').insert({name:f.name,skill:f.skill,positions:f.positions,games_played:0});await load();};
  const updatePlayer=async(id,f)=>{await sb.from('players').update({name:f.name,skill:f.skill,positions:f.positions}).eq('id',id);await load();};
  const deletePlayer=async id=>{await sb.from('players').delete().eq('id',id);await load();};
  const saveGame=async data=>{await sb.from('games').insert(data);await load();};
  const updateGame=async(id,data)=>{await sb.from('games').update(data).eq('id',id);await load();};
  const deleteGame=async id=>{await sb.from('games').delete().eq('id',id);await load();};

  const isAdmin=role==='admin';
  const isCaptain=role==='admin'||role==='captain';
  const roleBadge=role==='admin'?'ADMIN':role==='captain'?'CAPTAIN':null;
  const badgeColor=role==='admin'?'rgba(255,255,255,0.25)':'rgba(255,220,100,0.35)';

  if(loading) return <div className="loading"><span style={{fontSize:32}}>⚽</span>Loading…</div>;

  if(showSettings&&isAdmin) return <div className="app">
    <div className="header">
      <div><h1>⚽ Pickup Soccer</h1><p style={{color:'rgba(255,255,255,0.6)',fontSize:11}}>{groupName}</p></div>
      <span className="admin-badge">ADMIN</span>
    </div>
    <Settings role={role} players={players} onClose={()=>{setShowSettings(false);load();}}/>
  </div>;

  return <div className="app">
    <div className="header">
      <div>
        <h1>⚽ Pickup Soccer</h1>
        <p style={{color:'rgba(255,255,255,0.6)',fontSize:11}}>{groupName.toUpperCase()}</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {roleBadge&&<span className="admin-badge" style={{background:badgeColor}}>{roleBadge}</span>}
        {isCaptain&&pendingCount>0&&<button className="hdr-btn" style={{position:'relative',background:'#e07b5a',border:'none'}} onClick={()=>setShowApprovals(true)}>
          👤 <span style={{background:'#fff',color:'#c0392b',borderRadius:10,padding:'1px 6px',fontSize:11,fontWeight:700,marginLeft:2}}>{pendingCount}</span>
        </button>}
        {isAdmin&&<button className="hdr-btn" onClick={()=>setShowSettings(true)}>⚙️</button>}
        {user&&<a href="/profile" className="hdr-btn" style={{fontSize:11,textDecoration:'none',padding:'5px 8px'}}>👤 Profile</a>}
        {user
          ?<button className="hdr-btn" onClick={()=>sb.auth.signOut()}>Logout</button>
          :<button className="hdr-btn" onClick={()=>setShowLogin(true)}>Login</button>
        }
      </div>
    </div>
    <nav>
      {[['roster','👥 Roster'],['game','⚽ Teams'],['history','📋 History']].map(([v,l])=>(
        <button key={v} className={view===v?'active':''} onClick={()=>setView(v)}>{l}</button>
      ))}
    </nav>
    {view==='roster'&&<Roster players={players} isAdmin={isCaptain} canDelete={isAdmin} onAdd={addPlayer} onUpdate={updatePlayer} onDelete={deletePlayer}/>}
    {view==='game'&&<Game players={players} isAdmin={isCaptain} onSaveGame={saveGame} games={games}/>}
    {view==='history'&&<History games={games} players={players} isAdmin={isCaptain} canDelete={isAdmin} onUpdateGame={updateGame} onDeleteGame={deleteGame}/>}
    {showLogin&&<LoginModal onClose={()=>setShowLogin(false)}/>}
    {showApprovals&&<ApprovalQueue onClose={()=>{setShowApprovals(false);fetchPendingCount();}} players={players} onApproved={()=>{load();fetchPendingCount();}}/>}
    <div style={{textAlign:'center',padding:'24px 16px 8px',borderTop:'1px solid #e0e0e0',marginTop:8}}>
      <a href="/privacy" target="_blank" style={{fontSize:12,color:'#888',textDecoration:'none',marginRight:16}}>Privacy Policy</a>
      <a href="/deletion" target="_blank" style={{fontSize:12,color:'#888',textDecoration:'none',marginRight:16}}>Data Deletion</a>
      <span style={{fontSize:12,color:'#ccc'}}>soccer.dvornikov.pro</span>
    </div>
  </div>;
}

function ApprovalQueue({onClose,players,onApproved}) {
  const [pending,setPending]=useState([]);
  const [busy,setBusy]=useState(null);
  const [msg,setMsg]=useState('');

  useEffect(()=>{
    sb.from('pending_profiles').select('*').eq('status','pending').order('created_at').then(({data})=>setPending(data||[]));
  },[]);

  const approve=async(p,linkToId)=>{
    setBusy(p.id);setMsg('');
    if(linkToId){
      const {error}=await sb.from('players').update({
        auth_user_id:p.auth_user_id,linked_at:new Date().toISOString(),
        first_name:p.first_name,last_name:p.last_name,date_of_birth:p.date_of_birth,
        is_minor:p.is_minor,city:p.city,dominant_foot:p.dominant_foot,
        positions:p.positions,years_played:p.years_played,league_experience:p.league_experience,
        player_notes:p.player_notes,profile_complete:true,
        ...(p.photo_url?{photo_url:p.photo_url}:{})
      }).eq('id',linkToId);
      if(!error){
        await sb.from('pending_profiles').update({status:'linked',reviewed_at:new Date().toISOString()}).eq('id',p.id);
        setPending(prev=>prev.filter(x=>x.id!==p.id));
        onApproved();setMsg('Linked to existing player ✓');
      } else setMsg('Error: '+error.message);
    } else {
      const name=`${p.first_name} ${p.last_name.charAt(0)}.`;
      const {error}=await sb.from('players').insert({
        name,skill:5,positions:p.positions||['MID'],
        auth_user_id:p.auth_user_id,linked_at:new Date().toISOString(),
        first_name:p.first_name,last_name:p.last_name,date_of_birth:p.date_of_birth,
        is_minor:p.is_minor,city:p.city,dominant_foot:p.dominant_foot,
        years_played:p.years_played,league_experience:p.league_experience,
        player_notes:p.player_notes,profile_complete:true,
        ...(p.photo_url?{photo_url:p.photo_url}:{})
      });
      if(!error){
        await sb.from('pending_profiles').update({status:'approved',reviewed_at:new Date().toISOString()}).eq('id',p.id);
        setPending(prev=>prev.filter(x=>x.id!==p.id));
        onApproved();setMsg('Added to roster as new player ✓');
      } else setMsg('Error: '+error.message);
    }
    setBusy(null);
  };

  const reject=async(p)=>{
    const reason=prompt('Reason for rejection (optional):');
    setBusy(p.id);
    await sb.from('pending_profiles').update({status:'rejected',rejection_reason:reason||'Not approved.',reviewed_at:new Date().toISOString()}).eq('id',p.id);
    setPending(prev=>prev.filter(x=>x.id!==p.id));
    setBusy(null);setMsg('Rejected ✓');
  };

  return <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:500,maxHeight:'85vh',overflowY:'auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <h2 style={{margin:0}}>New player requests ({pending.length})</h2>
        <button className="btn sm" onClick={onClose}>✕</button>
      </div>
      {msg&&<div className="alert green" style={{marginBottom:12}}>{msg}</div>}
      {pending.length===0&&<p style={{color:'#888',textAlign:'center',padding:'20px 0'}}>No pending requests</p>}
      {pending.map(p=>{
        const sug=p.suggested_player_id?players.find(pl=>pl.id===p.suggested_player_id):null;
        return <div key={p.id} style={{border:'1px solid #e0e0e0',borderRadius:10,padding:14,marginBottom:12,background:'#fafafa'}}>
          <div style={{display:'flex',gap:10,marginBottom:8}}>
            {p.photo_url&&<img src={p.photo_url} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover'}} alt=""/>}
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{p.first_name} {p.last_name}</div>
              <div style={{fontSize:12,color:'#888'}}>{p.email}</div>
              <div style={{fontSize:12,color:'#666',marginTop:2}}>{p.city} · {p.dominant_foot} foot · {(p.positions||[]).join('/')}</div>
            </div>
          </div>
          <div style={{fontSize:12,color:'#555',marginBottom:8,lineHeight:1.8}}>
            <span style={{marginRight:12}}>⏱ {p.years_played} yrs</span>
            <span style={{marginRight:12}}>🏆 {p.league_experience}</span>
            {p.is_minor&&<span style={{color:'#e07b5a',fontWeight:600}}>⚠ Minor</span>}
          </div>
          {p.player_notes&&<div style={{fontSize:12,color:'#666',background:'#f5f5f5',borderRadius:6,padding:'6px 10px',marginBottom:8,fontStyle:'italic'}}>"{p.player_notes}"</div>}
          {sug&&<div style={{fontSize:12,background:'#eaf5e0',border:'1px solid #a8d87a',borderRadius:6,padding:'6px 10px',marginBottom:8}}>
            Claims to be: <strong>{sug.name}</strong> in the roster
          </div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {sug&&<button className="btn primary" style={{fontSize:12,padding:'6px 12px'}} disabled={busy===p.id}
              onClick={()=>approve(p,p.suggested_player_id)}>🔗 Link to {sug.name}</button>}
            <button className="btn" style={{fontSize:12,padding:'6px 12px',background:'#eaf5e0',borderColor:'#a8d87a',color:'#2a5c0e'}} disabled={busy===p.id}
              onClick={()=>approve(p,null)}>✓ Add as new</button>
            <button className="btn danger" style={{fontSize:12,padding:'6px 12px'}} disabled={busy===p.id}
              onClick={()=>reject(p)}>✕ Reject</button>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
